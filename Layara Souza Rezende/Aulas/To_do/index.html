<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <SCRIpt src="scriptJS.js"></SCRIpt>
    <style>
        body {
            font-family: 'Gill Sans';
            background: #cdcdcd;
            padding: 16px;
        }

        h1 {
            color: palevioletred;
            text-align: center;
        }

        .input-area {
            text-align: center;
            margin-bottom: 28px;
        }

        #tarefaInput {
            padding: 8px;
            width: 500px;
            border-radius: 8px;
        }

        #btnAdicionar {
            padding: 8px 28px;
            margin-left: 5px;
            color: white;
            background-color: gold;
            border: #333;
            border-radius: 8px;
            cursor: pointer;
        }

        #btnAdicionar:hover {
            color: white;
            background-color: rgb(130, 114, 27);
            ;
            transition: 0.5s;
        }

        ul {
            padding: 0px;
            margin-left: 50px;
        }

        li {
            background: #fff;
            margin: 16px 16px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-content: center;
        }

        li.concluida {
            text-decoration: line-through;
            color: red;
        }

        .fechar {
            background-color: red;
            color: white;
            border: #333;
            border-radius: 100px;
        }
    </style>
</head>

<body>
    <h1>Tasks To Do</h1>
    <div class="input-area">
        <input type="text" id="tarefaInput" placeholder="Digite sua tarefa">
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>


</body>

</html>
