<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá mundo do VUE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> <!-- link para usar o VUE-->
    <script src="app.js" defer></script> <!-- sem o defer o view não roda. Pesquisar depois para que ele serve-->
</head>

<body>
    <div id="app">
        <input type="text" placeholder="Digite algo" v-model="inputText">
        <p>Meu nome: {{ nome }} com idade: {{ idade }} </p>
        <br><br><br>
        <hr>
        <br><br><br>

        <h1>Reatividade funcionando {{ inputText }}</h1>

    </div>

</body>

</html>
